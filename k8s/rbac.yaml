apiVersion: v1
kind: ServiceAccount
metadata:
  name: task-manager-sa
  namespace: default

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: task-manager-role
  namespace: default
rules:
- apiGroups: [""]
  resources: ["pods", "services", "endpoints"]
  verbs: ["get", "list", "watch"]

- apiGroups: ["apps"]
  resources: ["deployments", "replicasets"]
  verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: task-manager-rolebinding
  namespace: default
subjects:
- kind: ServiceAccount
  name: task-manager-sa
  namespace: default

roleRef:
  kind: Role
  name: task-manager-role
  apiGroup: rbac.authorization.k8s.io